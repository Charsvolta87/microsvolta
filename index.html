<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Micros Volta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1 style="text-align:center; padding:10px;">Micros Volta</h1>

  <div class="container">

    <!-- IZQUIERDA -->
    <div class="left">
      <div class="card">
        <h2>Agregar Evento</h2>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="lugar" placeholder="Lugar">
        <input type="date" id="fecha">
        <input type="number" id="precio" placeholder="Precio">
        <button id="btnAgregar">Agregar</button>
      </div>

      <div class="card">
        <h2>Calendario</h2>
        <div id="calendario"></div>
      </div>
    </div>

    <!-- DERECHA -->
    <div class="right">
      <div class="card">
        <h2>Eventos</h2>
        <ul id="listaEventos"></ul>
      </div>
    </div>

  </div>

</body>

  <script type="module" src="app.js"></script>
</body>
</html>
