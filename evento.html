<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="card">
      <h2 id="titulo"></h2>
      <p id="info"></p>
    </div>

    <div class="card">
      <h3>Agregar Pasajero</h3>
      <input type="text" id="pNombre" placeholder="Nombre">
      <input type="text" id="pDni" placeholder="DNI">
      <input type="text" id="pSubida" placeholder="Dónde sube">
      <button id="btnPasajero">Agregar</button>
    </div>

    <div class="card">
      <h3>Pasajeros</h3>
      <ul id="listaPasajeros"></ul>
    </div>

  </div>

  <script type="module" src="evento.js"></script>
</body>

<script>
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC-hMSencH40g6ojgPSqosj69Ixkkraf7w",
  authDomain: "microsvolta.firebaseapp.com",
  projectId: "microsvolta",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 OBTENER ID DESDE URL
const params = new URLSearchParams(window.location.search);
const idEvento = params.get("id");

const eventoRef = ref(db, "eventos/" + idEvento);
const pasajerosRef = ref(db, `eventos/${idEvento}/pasajeros`);

// ELEMENTOS
const titulo = document.getElementById("titulo");
const info = document.getElementById("info");
const lista = document.getElementById("listaPasajeros");

// MOSTRAR EVENTO
onValue(eventoRef, (snap) => {
  const ev = snap.val();
  if (!ev) return;

  titulo.textContent = ev.nombre;
  info.textContent = `📍 ${ev.lugar} | 📅 ${ev.fecha} | 💰 $${ev.precio}`;
});

// AGREGAR PASAJERO
document.getElementById("btnPasajero").addEventListener("click", () => {
  const nombre = document.getElementById("pNombre").value;
  const dni = document.getElementById("pDni").value;
  const subida = document.getElementById("pSubida").value;

  if (!nombre || !dni || !subida) {
    alert("Completa todo");
    return;
  }

  push(pasajerosRef, {
    nombre,
    dni,
    subida
  });

  // reset
  document.getElementById("pNombre").value = "";
  document.getElementById("pDni").value = "";
  document.getElementById("pSubida").value = "";
});

// LISTAR PASAJEROS
onValue(pasajerosRef, (snap) => {
  const data = snap.val();
  lista.innerHTML = "";

  if (!data) return;

  Object.values(data).forEach(p => {
    const li = document.createElement("li");
    li.textContent = `${p.nombre} - DNI: ${p.dni} - 📍 ${p.subida}`;
    lista.appendChild(li);
  });
});
</script>
</html>
