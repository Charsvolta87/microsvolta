<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="card">
      <h2 id="titulo"></h2>
      <p id="info"></p>
    </div>

    <div class="card">
      <h3>Agregar Pasajero</h3>
      <input type="text" id="pNombre" placeholder="Nombre">
      <input type="text" id="pDni" placeholder="DNI">
      <input type="text" id="pSubida" placeholder="Dónde sube">
      <input type="text" id="pTelefono" placeholder="Teléfono">
      <button id="btnPasajero">Agregar</button>
    </div>

    <div class="card">
      <h3>Pasajeros</h3>
      <ul id="listaPasajeros"></ul>
    </div>

  </div>

  <script type="module" src="evento.js"></script>
</body>
</html>
